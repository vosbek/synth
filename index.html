<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynthGrid — Browser Synth & Step Sequencer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>SynthGrid</h1>
      <div id="transport">
        <button id="btn-play" class="transport-btn" title="Play">&#9654;</button>
        <button id="btn-stop" class="transport-btn" title="Stop">&#9632;</button>
        <div class="bpm-control">
          <label for="bpm">BPM</label>
          <input type="range" id="bpm" min="40" max="240" value="120">
          <span id="bpm-display">120</span>
        </div>
        <div class="swing-control">
          <label for="swing">Swing</label>
          <input type="range" id="swing" min="0" max="100" value="0">
          <span id="swing-display">0%</span>
        </div>
        <div class="master-vol">
          <label for="master-volume">Vol</label>
          <input type="range" id="master-volume" min="0" max="100" value="75">
        </div>
      </div>
      <div id="presets">
        <label for="preset-select">Pattern:</label>
        <select id="preset-select">
          <option value="empty">Empty</option>
          <option value="four-on-floor">Four on the Floor</option>
          <option value="hip-hop">Hip Hop</option>
          <option value="dnb">Drum & Bass</option>
          <option value="techno">Techno</option>
          <option value="ambient">Ambient</option>
        </select>
      </div>
    </header>

    <!-- Visualizer -->
    <section id="visualizer-section">
      <canvas id="visualizer" width="900" height="140"></canvas>
    </section>

    <!-- Sequencer Grid -->
    <section id="sequencer-section">
      <div id="sequencer-grid">
        <!-- Tracks are generated by JS -->
      </div>
    </section>

    <!-- Track Controls -->
    <section id="track-controls-section">
      <div id="track-controls">
        <!-- Generated by JS -->
      </div>
    </section>

    <!-- Piano / Keyboard -->
    <section id="keyboard-section">
      <div id="piano-label">Keyboard <span class="hint">(Use keys Z-M and Q-P to play)</span></div>
      <div id="piano">
        <!-- Generated by JS -->
      </div>
    </section>

    <!-- Effects -->
    <section id="effects-section">
      <h2>Effects</h2>
      <div id="effects-panel">
        <div class="effect-group">
          <h3>Filter</h3>
          <label>Cutoff <input type="range" id="fx-filter-freq" min="20" max="20000" value="20000" class="fx-knob"></label>
          <label>Resonance <input type="range" id="fx-filter-q" min="0" max="30" value="1" step="0.1" class="fx-knob"></label>
          <label>Type
            <select id="fx-filter-type">
              <option value="lowpass">Low Pass</option>
              <option value="highpass">High Pass</option>
              <option value="bandpass">Band Pass</option>
              <option value="notch">Notch</option>
            </select>
          </label>
        </div>
        <div class="effect-group">
          <h3>Delay</h3>
          <label>Time <input type="range" id="fx-delay-time" min="0" max="1" value="0.3" step="0.01" class="fx-knob"></label>
          <label>Feedback <input type="range" id="fx-delay-feedback" min="0" max="0.95" value="0.3" step="0.01" class="fx-knob"></label>
          <label>Mix <input type="range" id="fx-delay-mix" min="0" max="1" value="0" step="0.01" class="fx-knob"></label>
        </div>
        <div class="effect-group">
          <h3>Reverb</h3>
          <label>Size <input type="range" id="fx-reverb-size" min="0.1" max="5" value="2" step="0.1" class="fx-knob"></label>
          <label>Mix <input type="range" id="fx-reverb-mix" min="0" max="1" value="0" step="0.01" class="fx-knob"></label>
        </div>
        <div class="effect-group">
          <h3>Distortion</h3>
          <label>Amount <input type="range" id="fx-distortion-amount" min="0" max="100" value="0" class="fx-knob"></label>
          <label>Mix <input type="range" id="fx-distortion-mix" min="0" max="1" value="0" step="0.01" class="fx-knob"></label>
        </div>
      </div>
    </section>

    <footer>
      <p>SynthGrid &mdash; Built with Web Audio API. No dependencies. Just open and play.</p>
    </footer>
  </div>

  <script src="js/audio-engine.js"></script>
  <script src="js/sequencer.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
